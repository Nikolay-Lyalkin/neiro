version: "3.11.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: neiro
    container_name: neiro_web
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - static_volume:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    stdin_open: true
    tty: true
    command: tail -f /dev/null

  db:
    image: postgres:16
    container_name: db_neiro
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  static_volume: